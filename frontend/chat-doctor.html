<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Doctor — VaidyaIQ</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/animations.css">
    <style>
        #chat-window {
            max-width: 720px;
            margin: 0 auto;
            width: 100%;
        }
        .chat-input-area .input-row,
        #answer-chips {
            max-width: 720px;
            margin-left: auto;
            margin-right: auto;
        }
        body { padding-bottom: 0; }

        .chat-shell {
            display: flex;
            flex-direction: column;
            height: 100dvh;
            padding-top: 60px;
            transition: padding-left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .progress-header {
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-bottom: none;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
            position: sticky;
            top: 0;
            z-index: 5;
        }

        .progress-label {
            font-size: 12px;
            color: var(--text-dim);
            white-space: nowrap;
            min-width: 100px;
            font-weight: 500;
        }

        .step-dots {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .step-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--surface3);
            transition: all var(--transition);
        }
        .step-dot.done { background: var(--primary); }
        .step-dot.active { background: var(--primary); width: 18px; border-radius: 4px; }

        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 2px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        .chat-date-sep {
            text-align: center;
            font-size: 11px;
            color: var(--text-muted);
            margin: 8px 0;
            letter-spacing: 0.3px;
        }

        .chat-input-area {
            background: var(--bg2);
            border-top: 1px solid var(--border);
            padding: 10px 12px;
            flex-shrink: 0;
            position: sticky;
            bottom: 0;
            z-index: 10;
        }

        #answer-chips {
            display: none;
            gap: 8px;
            margin-bottom: 10px;
            flex-wrap: wrap;
            background: var(--bg2);
            padding: 8px 0;
            position: sticky;
            bottom: 0;
            z-index: 10;
        }

        .input-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .input-row input {
            flex: 1;
            padding: 0 16px !important;
            height: 48px;
            font-size: 15px !important;
        }

        #chat-window::-webkit-scrollbar { width: 3px; }
        #chat-window::-webkit-scrollbar-thumb { background: var(--surface3); }

        .page-title-bar {
            background: var(--bg2);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }
        .page-title-bar h1 {
            font-size: 15px;
            font-weight: 600;
            color: var(--text);
            letter-spacing: -0.2px;
        }
        .page-title-bar .badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            font-weight: 600;
            color: var(--primary);
            background: var(--primary-dim);
            border-radius: 12px;
            padding: 3px 10px;
            margin-left: auto;
        }
        .badge-dot {
            width: 5px; height: 5px;
            background: var(--primary);
            border-radius: 50%;
        }
        
        /* Fix for mobile scrolling */
        @media (max-width: 768px) {
            #chat-window {
                padding-bottom: 20px;
            }
            .chat-bubble-ai, .chat-bubble-user {
                max-width: 90%;
            }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <button class="hamburger-btn" onclick="toggleHamburger()" aria-label="Menu">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="6" x2="21" y2="6"/>
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
    </button>

    <aside class="hamburger-sidebar" id="hamburger-sidebar" style="background: #080808 !important; backdrop-filter: none !important;">
        <a href="chat-doctor.html">Doctor</a>
        <a href="prescription.html">Prescription</a>
        <a href="therapist.html">Therapy</a>
        <hr class="sidebar-divider">
        <div class="sidebar-section-title">Chats</div>
        <div id="hamburger-chat-list"></div>
    </aside>

    <a href="index.html" class="logo" aria-label="VaidyaIQ home">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="22" height="22" aria-hidden="true">
            <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
        </svg>
        VaidyaIQ
    </a>

    <div class="lang-select-wrap">
        <select onchange="setLanguage(this.value)" aria-label="Select language">
            <option value="english">English</option>
            <option value="hindi">हिन्दी</option>
            <option value="hinglish">Hinglish</option>
            <option value="bengali">বাংলা</option>
            <option value="marathi">मराठी</option>
            <option value="telugu">తెలుగు</option>
            <option value="tamil">தமிழ்</option>
        </select>
    </div>
</nav>

<div class="chat-shell">
    <div class="page-title-bar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M9 12h6m-6 4h3m-3-8h3"/><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M3 9h18"/>
        </svg>
        <h1>Chat Doctor</h1>
        <div class="badge" role="status" aria-live="polite">
            <span class="badge-dot" aria-hidden="true"></span>
            <span id="progress-label">Ready</span>
        </div>
    </div>

    <div class="progress-header" role="progressbar" aria-label="Consultation progress" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
        <div class="progress-bar-wrap" style="flex:1; margin:0;">
            <div class="progress-bar" id="progress-bar" style="width:0%"></div>
        </div>
        <div class="step-dots" id="step-dots" aria-hidden="true">
            <div class="step-dot active"></div>
            <div class="step-dot"></div>
            <div class="step-dot"></div>
            <div class="step-dot"></div>
            <div class="step-dot"></div>
        </div>
    </div>

    <div id="chat-window" role="log" aria-label="Conversation" aria-live="polite">
        <div class="chat-date-sep">Today</div>
        <div class="chat-bubble-ai slide-up">
            Hello! I'm your AI health assistant. Please describe your symptoms or health concern, and I'll help you understand what might be happening.
        </div>
    </div>

    <div class="chat-input-area">
        <div id="answer-chips" role="group" aria-label="Quick answer options">
            <button class="chip yes" onclick="submitAnswer('Yes')" aria-label="Yes">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>
                Yes
            </button>
            <button class="chip no" onclick="submitAnswer('No')" aria-label="No">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                No
            </button>
            <button class="chip unsure" onclick="submitAnswer('Not sure')" aria-label="Not sure">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                Not Sure
            </button>
        </div>
        <div class="input-row">
            <input type="text" id="chat-input" placeholder="Describe your symptoms..." aria-label="Type your symptoms or health concern" onkeydown="if(event.key==='Enter' && !event.shiftKey) { event.preventDefault(); sendUserMessage(); }" autocomplete="off" inputmode="text">
            <button class="send-btn" id="send-btn" onclick="sendUserMessage()" aria-label="Send message">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                Send
            </button>
        </div>
    </div>
</div>

<script src="js/language.js"></script>
<script src="js/api.js"></script>
<script src="js/shared-history.js"></script>
<script src="js/chat-doctor.js"></script>
</body>
</html>
